{{- if .Values.loraController.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lora-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: lora-controller
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lora-controller
  template:
    metadata:
      labels:
        app: lora-controller
    spec:
      {{- if hasKey $modelSpec "initContainer" }}
      {{- $container := $modelSpec.initContainer }}
      initContainers:
        - name: {{ $container.name }}
          image: {{ $container.image }}
          {{- if $container.command }}
          command: {{ toYaml $container.command | nindent 12 }}
          {{- end }}
          {{- if $container.args }}
          args: {{ toYaml $container.args | nindent 12 }}
          {{- end }}
          {{- if $container.env }}
          env: {{ toYaml $container.env | nindent 12 }}
          {{- end }}
          {{- if $container.resources }}
          resources: {{ toYaml $container.resources | nindent 12 }}
          {{- end }}
          {{- if hasKey $container "mountPvcStorage" }}
          volumeMounts:
          {{- if and $container.volumeMounts.pvcStorage (hasKey $modelSpec "pvcStorage") }}
            - name: {{ .Release.Name }}-storage
              mountPath: /data
          {{- end }}
          {{- end }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.loraController.image.repository }}:{{ .Values.loraController.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.loraController.image.pullPolicy }}
          resources:
            {{- toYaml .Values.loraController.resources | nindent 12 }}
          env:
            - name: WATCH_NAMESPACE
              {{- if .Values.loraController.watchNamespaces }}
              value: "{{ join "," .Values.loraController.watchNamespaces }}"
              {{- else }}
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
              {{- end }}
            - name: OPERATOR_NAME
              value: "lora-controller"
            - name: RESYNC_PERIOD
              value: "{{ .Values.loraController.resyncPeriod | default 300 }}"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LORA_ENABLED_LABEL
              value: "lora-enabled=true" 
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- with .Values.loraController.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.loraController.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.loraController.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
