apiVersion: production-stack.vllm.ai/v1alpha1
kind: LoraAdapter
metadata:
  name: sql-adapter
spec:
  baseModel: "meta-llama/Llama-2-70b-hf"
  adapterSource:
    type: "huggingface"
    repository: "yard1/llama-2-7b-sql-lora-test"
  credentialsSecretRef:
    name: "huggingface-credentials"
  deploymentConfig:
    algorithm: "default"
    podSelector:
      matchLabels:
        lora-enabled: "true"
        baseModel: "meta-llama-Llama-2-70b-hf"